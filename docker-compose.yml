services:
  tsa-tracker:
    build: .
    ports:
      - "5100:5100"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - DATA_DIR=/app/data
      - BROWSERLESS_URL=http://host.docker.internal:3100
      - BROWSERLESS_TOKEN=poseidon-scraper-token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s